services:
  db:
    image: postgres:18-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 60s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      - POSTGRES_HOST=db
      - BACKUP_DIR=/app/backups
      - SSL_CERTFILE=/app/certs/cert.pem
      - SSL_KEYFILE=/app/certs/key.pem
    ports:
      - "8000:8000"
    volumes:
      - .env:/app/.env
      - backups_data:/app/backups
      - ./certs:/app/certs:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, ssl; urllib.request.urlopen('https://localhost:8000/api/health', context=ssl._create_unverified_context())\""]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CASHIO_API_BASE_URL: ${VITE_CASHIO_API_BASE_URL}
    container_name: frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - VITE_CASHIO_API_BASE_URL=${VITE_CASHIO_API_BASE_URL}
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO /dev/null https://127.0.0.1:443/ || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped


volumes:
  postgres_data:
  backups_data:
