services:
  db:
    image: postgres:latest
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      - POSTGRES_HOST=db
      - BACKUP_DIR=/app/backups
    ports:
      - "8000:8000"
    volumes:
      - .env:/app/.env
      - backups_data:/app/backups
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CASHIO_API_BASE_URL: ${VITE_CASHIO_API_BASE_URL}
    container_name: frontend
    ports:
      - "3000:80"
    environment:
      - VITE_CASHIO_API_BASE_URL=${VITE_CASHIO_API_BASE_URL}
    depends_on:
      - backend
    restart: unless-stopped


volumes:
  postgres_data:
  backups_data:
